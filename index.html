      {

        "parentOrganization": {

        "description": "Acceso selectivo a compradores cualificados para propietarios que valoran vender en el suroeste de Mallorca sin exposición pública innecesaria.",

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Qué es una venta discreta o off-market?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Una venta off-market es aquella en la que la propiedad no se publica en portales inmobiliarios de acceso masivo. El activo se presenta de forma confidencial a un grupo selecto de compradores cualificados, preservando la privacidad del vendedor y el valor del activo."
            }
          },
          {
            "@type": "Question",
            "name": "¿En qué zonas de Mallorca operáis?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Operamos principalmente en Palma, el suroeste de Mallorca y zonas premium como Andratx, Calvià, Son Vida, Portals Nous, Bendinat, Deià y Valldemossa. Evaluamos activos en otras ubicaciones según criterio."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto tiempo tarda el proceso de venta?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Depende del activo, la microzona y el precio de posicionamiento. Una venta privada bien ejecutada puede cerrarse entre 3 y 12 meses. Priorizamos el precio adecuado sobre la velocidad cuando el activo lo permite."
            }
          },
          {
            "@type": "Question",
            "name": "¿Podéis gestionar mi propiedad como alquiler vacacional?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. Evaluamos el potencial de alquiler vacacional premium para villas, fincas y apartamentos singulares en Mallorca. Orientamos la operativa hacia hóspedes cualificados y ofrecemos asesoramiento sobre viabilidad, posicionamiento y documentación."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo se calcula la valoración de mi propiedad?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Realizamos una valoración privada considerando la microzona, el estado del activo, la competencia real en el mercado y el perfil de comprador objetivo. No utilizamos únicamente comparables de portales públicos, que suelen sobrestimar o subestimar el valor real."
            }
          }
        ]
      }
    </script>
