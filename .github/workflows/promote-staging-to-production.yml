name: Promote staging to production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.2.0)"
        required: false

env:
  VITE_ANCLORA_NEXUS_BASE_URL: "http://localhost:3000"
  VITE_NEXUS_ORG_ID: "ci-org-placeholder"
  VITE_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout production
        run: git checkout production

      - name: Merge staging
        run: git merge --no-ff origin/staging -m "chore: merge staging to production [ci-skip]"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create tag
        if: github.event.inputs.version
        run: git tag -a "${{ github.event.inputs.version }}" -m "Release ${{ github.event.inputs.version }}"

      - name: Push production
        if: success()
        run: git push origin production

      - name: Push tag
        if: success() && github.event.inputs.version
        run: git push origin "${{ github.event.inputs.version }}"

      - name: Success
        if: success()
        run: |
          echo "✓ Successfully promoted staging to production"
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Vercel will deploy automatically."

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Promotion failed"
          echo "Check logs above for details."
        continue-on-error: true
