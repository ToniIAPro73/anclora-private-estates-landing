name: Promote development to staging

on:
  workflow_dispatch:

env:
  VITE_ANCLORA_NEXUS_BASE_URL: "http://localhost:3000"
  VITE_NEXUS_ORG_ID: "ci-org-placeholder"
  VITE_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout staging
        run: git checkout staging

      - name: Merge development
        run: git merge --no-ff origin/development -m "chore: merge development to staging [ci-skip]"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Push staging
        if: success()
        run: git push origin staging

      - name: Notify
        if: success()
        run: echo "✓ Successfully promoted development to staging"

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Promotion failed"
          echo "Merge may have conflicts. Resolve manually."
        continue-on-error: true
