name: CI

on:
  pull_request:
    branches: [development, staging, production]
  push:
    branches: [development, staging, production, main]

env:
  VITE_ANCLORA_NEXUS_BASE_URL: "http://localhost:3000"
  VITE_NEXUS_ORG_ID: "ci-org-placeholder"
  VITE_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
